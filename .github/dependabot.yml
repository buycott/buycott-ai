version: 2
updates:
  # Keep GitHub Actions current. (Tags are used for readability; Dependabot will
  # bump them promptly. To fully SHA-pin, run a pinning tool such as
  # `pinact` / `pin-github-action` and Dependabot will keep the hashes updated.)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
