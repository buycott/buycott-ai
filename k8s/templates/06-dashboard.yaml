apiVersion: apps/v1
kind: Deployment
metadata:
  name: buycott-dashboard
  namespace: {{NAMESPACE}}
  labels:
    app.kubernetes.io/name: buycott
    app.kubernetes.io/component: dashboard
spec:
  replicas: {{DASHBOARD_REPLICAS}}
  selector:
    matchLabels:
      app: buycott-dashboard
  template:
    metadata:
      labels:
        app: buycott-dashboard
        app.kubernetes.io/name: buycott
        app.kubernetes.io/component: dashboard
    spec:
      containers:
        - name: dashboard
          image: {{IMAGE}}
          imagePullPolicy: IfNotPresent
          command:
            - buycott
            - dashboard
            - --server
            - buycott-pipeline:{{API_PORT}}
            - --port
            - "{{DASHBOARD_PORT}}"
          ports:
            - name: http
              containerPort: {{DASHBOARD_PORT}}
              protocol: TCP
          resources:
            requests:
              cpu: {{DASHBOARD_CPU_REQUEST}}
              memory: {{DASHBOARD_MEMORY_REQUEST}}
            limits:
              cpu: {{DASHBOARD_CPU_LIMIT}}
              memory: {{DASHBOARD_MEMORY_LIMIT}}
          readinessProbe:
            httpGet:
              path: /
              port: {{DASHBOARD_PORT}}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: {{DASHBOARD_PORT}}
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: buycott-dashboard
  namespace: {{NAMESPACE}}
  labels:
    app.kubernetes.io/name: buycott
    app.kubernetes.io/component: dashboard
spec:
  selector:
    app: buycott-dashboard
  ports:
    - name: http
      port: {{DASHBOARD_PORT}}
      targetPort: {{DASHBOARD_PORT}}
      protocol: TCP
  # Set to NodePort or LoadBalancer to expose outside the cluster,
  # or configure an Ingress resource for production deployments.
  type: {{DASHBOARD_SERVICE_TYPE}}
