apiVersion: v1
kind: ConfigMap
metadata:
  name: buycott-config
  namespace: {{NAMESPACE}}
  labels:
    app.kubernetes.io/name: buycott
data:
  config.yaml: |
    project:
      name: "{{PROJECT_NAME}}"
      artifacts_path: /artifacts

    roles:
      pm:
        provider: anthropic
        model: claude-opus-4-8
      backend:
        provider: anthropic
        model: claude-sonnet-4-6
      frontend:
        provider: anthropic
        model: claude-sonnet-4-6
      copywriter:
        provider: anthropic
        model: claude-haiku-4-5
      reviewer:
        provider: anthropic
        model: claude-sonnet-4-6

    execution:
      max_retries: 10
      task_timeout: 5m
      docker_socket: /var/run/docker.sock
      prompts_dir: /etc/buycott/prompts
      release_check_interval: 10

    api:
      port: {{API_PORT}}

    dashboard:
      port: {{DASHBOARD_PORT}}

    api_keys:
      anthropic: ${ANTHROPIC_API_KEY}
      openai: ${OPENAI_API_KEY}
      gemini: ${GEMINI_API_KEY}
